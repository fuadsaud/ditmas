name: ellipsus
windows:
  - name: service
    root: ~/Sources/ellipsus/ellipsus-service
    layout: main-vertical
    focus: true
    panes:
      - commands:
          - nvim
        focus: true
      - commands:
          - make dcx-test-watch
      - commands:
          - make dc-up
      - commands:
          - git fetch
          - git status

  - name: synchronizer
    root: ~/Sources/ellipsus/synchronizer
    layout: main-vertical
    panes:
      - commands:
          - nvim
        focus: true
      - commands:
          - make dc-up
      - commands:
          - git fetch
          - git status

  - name: client
    root: ~/Sources/ellipsus/ellipsus-client
    layout: main-vertical
    panes:
      - commands:
          - nvim
        focus: true
      - commands:
          - pnpm turbo dev
      - commands:
          - cd web
          - git fetch
          - git status

  - name: infra
    root: ~/Sources/ellipsus/infra
    layout: main-vertical
    panes:
      - commands:
          - nvim
        focus: true
      - commands:
          - git fetch
          - git status
